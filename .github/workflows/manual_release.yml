name: "compile with OpenWrt"
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: "false"
  push:
    branches:
      - "main"
    paths:
      - "Makefile"
env:
  TZ: Asia/Shanghai
  OPENWRT_TARGET: x86
  OPENWRT_SUBTARGET: 64
  PACKAGE_NAME: luci-app-netstat

jobs:
  job_check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.check_version.outputs.latest_version }}
      has_update: ${{ steps.check_version.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: "main"

      - name: Check version
        id: check_version
        env:
          url_release: https://api.github.com/repos/${{ github.repository }}/releases/latest
        run: |
          latest_version=$(grep -oP 'PKG_VERSION:=\K.*' Makefile | sed 's/^/v/')
          latest_release=$(wget -qO- -t1 -T2 ${{env.url_release}} | awk -F '"' '/tag_name/{print $4}')
          has_update=$([ "${latest_version}" != "${latest_release}" ] && echo true || echo false)
          echo "latest_version=${latest_version}" >> $GITHUB_OUTPUT
          echo "has_update=${has_update}" >> $GITHUB_OUTPUT
          echo "latest_version: ${latest_version}"
          echo "latest_release: ${latest_release}"
          echo "has_update: ${has_update}"

      - name: Generate new tag & release
        if: steps.check_version.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: For openwrt official Snapshots LuCI master
          tag_name: ${{steps.check_version.outputs.latest_version}}

  job_build_package:
    name: Build package (${{ matrix.openwrt_version }}, ${{ matrix.pkg_ext }})
    needs: job_check
    if: needs.job_check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: 25.12.1
            pkg_ext: apk
          - openwrt_version: 24.10.0
            pkg_ext: ipk
    steps:
      - name: Install packages
        run: |
          echo "Install packages"
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Cache openwrt SDK
        id: cache-sdk
        uses: actions/cache@v3
        with:
          path: sdk
          key: openwrt-sdk-${{ matrix.openwrt_version }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}-${{ matrix.pkg_ext }}

      - name: Initialization environment
        run: |
          if [ "${{ steps.cache-sdk.outputs.cache-hit }}" != "true" ]; then
            download_base="https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${{ env.OPENWRT_TARGET }}/${{ env.OPENWRT_SUBTARGET }}"
            sdk_file=$(wget -qO- "${download_base}/sha256sums" | awk '/openwrt-sdk-${{ matrix.openwrt_version }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}_.*\.tar\.zst$/{gsub(/^\*/,"",$2); print $2; exit}')
            if [ -z "${sdk_file}" ]; then
              echo "::error::Unable to find SDK tarball for OpenWrt ${{ matrix.openwrt_version }}"
              exit 1
            fi
            wget "${download_base}/${sdk_file}"
            mkdir -p sdk && tar --zstd -xvf "${sdk_file}" -C ./sdk --strip-components=1
            cd sdk
            ./scripts/feeds update -a
          else
            cd sdk
          fi
          rm -rf package/downloads/${{ env.PACKAGE_NAME }}
          git clone -b main https://github.com/${{ github.repository }}.git package/downloads/${{ env.PACKAGE_NAME }}
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m" > .config
          ./scripts/feeds install -d n ${{ env.PACKAGE_NAME }}
          make download -j8

      - name: Configure (master)
        run: |
          cd sdk
          ./scripts/feeds install ${{ env.PACKAGE_NAME }}
          echo "CONFIG_ALL_NONSHARED=n" > .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL=n" >> .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m" >> .config
          make defconfig

      - name: Compile (master)
        id: compile
        run: |
          cd sdk
          echo "make package/${{ env.PACKAGE_NAME }}/clean package/${{ env.PACKAGE_NAME }}/compile -j$(nproc)"
          make package/${{ env.PACKAGE_NAME }}/clean package/${{ env.PACKAGE_NAME }}/compile -j$(nproc)
          mapfile -t pkg_files < <(find bin/packages -type f -name '${{ env.PACKAGE_NAME }}*.${{ matrix.pkg_ext }}')
          if [ ${#pkg_files[@]} -eq 0 ]; then
            echo "::error::No ${{ matrix.pkg_ext }} package generated for ${{ env.PACKAGE_NAME }}"
            find bin/packages -maxdepth 4 -type f
            exit 1
          fi
          mkdir -p ../artifacts
          cp "${pkg_files[@]}" ../artifacts/
          rm .config .config.old
          cd ..
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        if: steps.compile.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{needs.job_check.outputs.package_version}}
          files: artifacts/${{ env.PACKAGE_NAME }}*.${{ matrix.pkg_ext }}